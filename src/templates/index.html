<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Copilot — Get Matched, Scored, Ready to Apply</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
</head>
<body>
    <!-- Collapsed resume pill: shown after upload -->
    <div id="resume-pill" class="resume-pill hidden">
        <span class="pill-dot"></span>
        <span class="pill-filename" id="pill-filename"></span>
        <span class="pill-sep">·</span>
        <span class="pill-role" id="pill-role"></span>
        <button class="pill-action" id="pill-reupload">Re-upload</button>
    </div>

    <div class="container">
        <header id="hero" class="hero">
            <h1>Upload your resume. <span class="accent">Apply smarter in 60 seconds.</span></h1>
            <p class="subtitle">An agent reads your resume, finds matching jobs across five platforms, and scores each one against your background. Then tailors the resume for every role you click.</p>
        </header>

        <div id="upload-section" class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Drag & drop your resume PDF here</p>
                    <p class="drop-zone-hint">or click to browse (max 10MB)</p>
                </div>
                <input type="file" id="file-input" accept=".pdf" hidden>
            </div>
            <div class="upload-alt">
                <span>or</span>
                <button id="demo-btn" class="demo-btn">Try with a sample resume</button>
            </div>
            <div id="upload-status" class="upload-status hidden"></div>
        </div>

        <!-- JOBS MODE -->
        <div id="jobs-mode" class="mode-panel hidden">
            <div class="jobs-search-bar">
                <input type="text" id="job-query" placeholder="Role, e.g. senior python engineer" autocomplete="off">
                <input type="text" id="job-location" placeholder="Location (optional)" autocomplete="off">
                <label class="remote-toggle">
                    <input type="checkbox" id="job-remote"> Remote only
                </label>
                <div class="sites-selector">
                    <label class="site-checkbox">
                        <input type="checkbox" class="site-filter" value="indeed" checked> Indeed
                    </label>
                    <label class="site-checkbox">
                        <input type="checkbox" class="site-filter" value="google" checked> Google
                    </label>
                    <label class="site-checkbox">
                        <input type="checkbox" class="site-filter" value="linkedin"> LinkedIn
                    </label>
                    <label class="site-checkbox">
                        <input type="checkbox" class="site-filter" value="glassdoor"> Glassdoor
                    </label>
                    <label class="site-checkbox">
                        <input type="checkbox" class="site-filter" value="ziprecruiter"> ZipRecruiter
                    </label>
                </div>
                <button id="search-jobs-btn">Search Jobs</button>
            </div>
            <div id="jobs-status" class="jobs-status hidden"></div>
            <div id="jobs-list" class="jobs-list"></div>
        </div>
    </div>

    <!-- Action Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Title</h2>
                <button id="modal-close" aria-label="Close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button id="modal-copy" class="btn-secondary">Copy</button>
                <button id="modal-dismiss" class="btn-primary">Close</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
